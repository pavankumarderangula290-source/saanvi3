<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Saanvi International School</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body class="portal-page">

  <header class="portal-header">
    <div class="portal-logo">
      <img src="images/logo.jpg" alt="Logo" width="40" height="40">
      Admin Dashboard
    </div>
    <div class="portal-nav">
      <button onclick="openSettings()" class="btn btn-outline">Settings</button>
      <button onclick="sessionManager.clearSession()" class="btn btn-outline">Logout</button>
    </div>
  </header>

  <main class="portal-main">
    <div class="dashboard-header">
      <div>
        <h1>Staff Management</h1>
        <p style="color: var(--portal-muted);">Manage staff accounts and assign tasks</p>
      </div>
      <button onclick="openAddStaffModal()" class="btn btn-primary">+ Add New Staff</button>
    </div>

    <div class="dashboard-stats" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
      <div class="portal-card" style="text-align: center; padding: 1.5rem;">
        <h3 style="margin-bottom: 0.5rem; color: var(--portal-muted);">Total Staff</h3>
        <h2 id="total-staff-count" style="font-size: 2.5rem; color: var(--portal-primary);">0</h2>
      </div>
      <div class="portal-card" style="text-align: center; padding: 1.5rem;">
        <h3 style="margin-bottom: 0.5rem; color: var(--portal-muted);">Total Students</h3>
        <h2 id="total-student-count" style="font-size: 2.5rem; color: var(--portal-primary);">0</h2>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="portal-card">
        <div class="card-header">
          <h3>Staff Directory</h3>
        </div>
        <div class="table-responsive">
          <table class="portal-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Role/Subject</th>
                <th>Class</th>
                <th>Tasks Pending</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="staff-table-body">
              <!-- Staff rows will be rendered here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Add Staff Modal -->
  <div id="add-staff-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add New Staff</h3>
        <button class="modal-close" onclick="closeModal('add-staff-modal')">&times;</button>
      </div>
      <form id="add-staff-form">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="staff-name" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Role or Subject</label>
            <input type="text" id="staff-role" class="form-control" placeholder="e.g. Mathematics Teacher" required>
          </div>
          <div class="form-group">
            <label class="form-label">Assigned Class</label>
            <input type="text" id="staff-class" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Initial Passcode</label>
            <input type="text" id="staff-pass" class="form-control" required>
            <small style="color: var(--portal-muted); display: block; margin-top: 0.25rem;">Staff will be asked to change this on first login.</small>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('add-staff-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Staff</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Assign Work Modal -->
  <div id="assign-work-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Assign Work to <span id="assign-staff-name"></span></h3>
        <button class="modal-close" onclick="closeModal('assign-work-modal')">&times;</button>
      </div>
      <form id="assign-work-form">
        <input type="hidden" id="assign-staff-id">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Task Description</label>
            <textarea id="task-desc" class="form-control" rows="3" required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Deadline</label>
            <input type="date" id="task-deadline" class="form-control" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('assign-work-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Assign Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Admin Settings</h3>
        <button class="modal-close" onclick="closeModal('settings-modal')">&times;</button>
      </div>
      <form id="settings-form">
        <div class="modal-body">
          <div id="settings-alert" class="alert"></div>
          <div class="form-group">
            <label class="form-label">New Username</label>
            <input type="text" id="settings-user" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" id="settings-pass" class="form-control" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('settings-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="portal.js"></script>
  <script>
    // Protect page
    sessionManager.requireAuth('admin');

    // Load Data
    async function renderTable() {
      const staff = await adminApi.getStaff();
      const students = await staffApi.getStudents();
      
      document.getElementById('total-staff-count').textContent = staff.length;
      document.getElementById('total-student-count').textContent = students.length;

      const tbody = document.getElementById('staff-table-body');
      
      if (staff.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--portal-muted);">No staff members found. Click "Add New Staff" to begin.</td></tr>`;
        return;
      }

      tbody.innerHTML = staff.map(s => {
        const pendingTasks = s.tasks.filter(t => t.status !== 'completed').length;
        return `
          <tr>
            <td>${s.id}</td>
            <td><strong>${s.name}</strong></td>
            <td>${s.role}</td>
            <td>${s.classAssigned}</td>
            <td><span class="badge ${pendingTasks > 0 ? 'badge-pending' : 'badge-completed'}">${pendingTasks} pending</span></td>
            <td>
              <div style="display: flex; gap: 0.5rem;">
                <button onclick="openAssignModal('${s.id}', '${s.name}')" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Assign Work</button>
                <button onclick="deleteStaff('${s.id}')" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // Modal utils
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // Add Staff
    function openAddStaffModal() {
      document.getElementById('add-staff-form').reset();
      openModal('add-staff-modal');
    }

    document.getElementById('add-staff-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      await adminApi.addStaff({
        name: document.getElementById('staff-name').value,
        role: document.getElementById('staff-role').value,
        classAssigned: document.getElementById('staff-class').value,
        passcode: document.getElementById('staff-pass').value
      });
      closeModal('add-staff-modal');
      renderTable();
    });

    // Assign Work
    function openAssignModal(id, name) {
      document.getElementById('assign-work-form').reset();
      document.getElementById('assign-staff-id').value = id;
      document.getElementById('assign-staff-name').textContent = name;
      openModal('assign-work-modal');
    }

    document.getElementById('assign-work-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('assign-staff-id').value;
      const desc = document.getElementById('task-desc').value;
      const deadline = document.getElementById('task-deadline').value;
      
      await adminApi.assignTask(id, desc, deadline);
      closeModal('assign-work-modal');
      renderTable();
    });

    // Delete Staff
    async function deleteStaff(id) {
      if (confirm('Are you sure you want to delete this staff member?')) {
        await adminApi.deleteStaff(id);
        renderTable();
      }
    }

    // Settings
    function openSettings() {
      // we mock credentials in settings view since there's no fetch
      document.getElementById('settings-user').value = 'pavan';
      document.getElementById('settings-pass').value = '';
      openModal('settings-modal');
    }

    document.getElementById('settings-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      await adminApi.updateCredentials(
        document.getElementById('settings-user').value,
        document.getElementById('settings-pass').value
      );
      showAlert('settings-alert', 'Credentials updated successfully!', 'success');
      setTimeout(() => closeModal('settings-modal'), 1500);
    });

    // Initial render
    renderTable();
  </script>
</body>
</html>
